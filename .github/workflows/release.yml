name: release

# Cuts a GitHub release from a pushed `v*` tag (the final step of the
# manual release flow — bump version, tag, push). `workflow_dispatch` is
# a re-run escape hatch (supply the existing tag).
#
# Release & packaging theme. Chunk 2: multi-arch musl-static binaries +
# SHA256SUMS, release notes extracted from CHANGELOG.md. Chunk 3: a
# CycloneDX SBOM (syft), cosign keyless signatures over the checksums,
# and a multi-arch GHCR container (also cosign-signed). The .deb (chunk
# 4) adds to this file; it doesn't replace it.
#
# Cross-compilation is cargo-zigbuild: one x86 runner builds both the
# x86_64 and aarch64 musl targets via the zig linker — no QEMU, no
# Docker-in-CI (DESIGN_RELEASE_PACKAGING.md §3.2, decision 3). The
# container reuses those exact binaries (COPY, never recompile), so the
# image and the standalone binary are byte-identical per arch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)release, e.g. v0.16.0"
        required: true

permissions:
  contents: write # create the release + upload assets
  packages: write # push the container image to GHCR
  id-token: write # cosign keyless signing via GitHub OIDC

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  # Resolved tag for both trigger kinds.
  TAG: ${{ github.event.inputs.tag || github.ref_name }}
  # Strip debug symbols from the release binary at compile time —
  # arch-independent (no host `strip` needed for the aarch64 artifact).
  CARGO_PROFILE_RELEASE_STRIP: symbols
  CARGO_TERM_COLOR: always

jobs:
  # The tag must agree with the workspace version and have a dated
  # CHANGELOG section before anything is built or published.
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Version consistency (incl. tag == workspace version)
        run: |
          python3 scripts/check-version-consistency.py --selftest
          python3 scripts/check-version-consistency.py --tag "$TAG"
      - name: CHANGELOG has a section for this version
        run: |
          python3 scripts/extract-changelog.py --selftest
          version="${TAG#v}"
          # A final tag must have its own dated CHANGELOG section. A
          # pre-release for an upcoming version may not be documented yet
          # (the publish step falls back to the base section, then a
          # generic note) — so it's allowed, just reported.
          if [[ "$version" == *-* ]]; then
            base="${version%%-*}"
            if python3 scripts/extract-changelog.py "$base" > /dev/null 2>&1; then
              echo "Pre-release: will use the $base CHANGELOG section."
            else
              echo "Pre-release: no $base CHANGELOG section yet; generic notes will be used."
            fi
          else
            python3 scripts/extract-changelog.py "$version" > /dev/null
          fi

  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: true
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    env:
      # audiopus_sys decides static-vs-dynamic libopus from
      # `#[cfg(target_env = "musl")]` in its build script — but build
      # scripts see the *host* cfg, not the target. Cross-compiling from
      # a glibc host, that probes false and it emits a dynamic `-lopus`
      # that can't be resolved for a static musl binary (the native
      # alpine Docker build dodges this only because host == musl).
      # Force static linking, and always build the vendored libopus from
      # source so no host-arch system opus can leak into the cross build.
      LIBOPUS_STATIC: "1"
      LIBOPUS_NO_PKG: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Add target ${{ matrix.target }}
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Zig provides the cross `cc`/linker for both musl targets.
      # cargo-zigbuild auto-detects the pip-installed ziglang module, so
      # no system zig / third-party action is needed.
      - name: Install zig (ziglang) + cargo-zigbuild
        run: |
          python3 -m pip install --user ziglang
          cargo install cargo-zigbuild --locked

      # tract-linalg (pulled in by forge-vad's neural backend since
      # 0.37.0) compiles its aarch64 SVE f16 kernels with the GCC/clang
      # feature spelling `-march=armv8.2-a+sve+fp16`; zig's feature
      # parser only knows the LLVM name `fullfp16` and hard-errors on
      # `fp16`. Shim the C compiler for the aarch64 leg: rewrite the
      # spelling, then exec `cargo-zigbuild zig cc` with the same
      # `-target` its own generated wrapper would use (cargo-zigbuild
      # respects a pre-set CC_<target>, see its add_env_if_missing).
      # Identical codegen — same kernels, same feature bit. Drop once
      # tract probes the spelling or cargo-zigbuild maps the alias.
      - name: CC shim — spell +fp16 as +fullfp16 for zig (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          shim="$RUNNER_TEMP/zigcc-fp16-shim.sh"
          cat > "$shim" <<'EOF'
          #!/bin/sh
          n=$#
          i=0
          while [ $i -lt $n ]; do
            a=$1; shift
            case "$a" in
              -march=*) a=$(printf '%s' "$a" | sed 's/+fp16+/+fullfp16+/g; s/+fp16$/+fullfp16/');;
            esac
            set -- "$@" "$a"
            i=$((i+1))
          done
          exec cargo-zigbuild zig cc -- -target aarch64-linux-musl "$@"
          EOF
          chmod +x "$shim"
          echo "CC_aarch64_unknown_linux_musl=$shim" >> "$GITHUB_ENV"

      - name: Build (release, static musl)
        run: |
          cargo zigbuild --release --locked \
            -p siphon-ai --target ${{ matrix.target }}

      # Package: the binary + both licenses + README into a versioned
      # tarball. The binary is fully static, so the tarball is the whole
      # delivery for that arch.
      - name: Package
        run: |
          version="${TAG#v}"
          dist="siphon-ai-${version}-${{ matrix.target }}"
          mkdir -p "staging/${dist}"
          cp "target/${{ matrix.target }}/release/siphon-ai" "staging/${dist}/"
          cp LICENSE-APACHE LICENSE-MIT README.md "staging/${dist}/"
          tar -C staging -czf "${dist}.tar.gz" "${dist}"
          ls -l "${dist}.tar.gz"

      # .deb from the *same* prebuilt static binary. --no-build reuses
      # it; --no-strip keeps the already-stripped binary (and avoids
      # needing an aarch64-aware `strip` on the x86 runner). cargo-deb
      # maps the Rust target to the Debian arch (amd64/arm64).
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: |
          cargo deb --no-build --no-strip \
            -p siphon-ai --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb .
          ls -l ./*.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            siphon-ai-*.tar.gz
            *.deb
          retention-days: 7
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: SBOM (CycloneDX, from Cargo.lock)
        run: |
          version="${TAG#v}"
          syft scan dir:. \
            -o cyclonedx-json="dist/siphon-ai-${version}-sbom.cdx.json"

      # SHA256SUMS covers the tarballs, the .deb packages, *and* the
      # SBOM, so the single cosign signature below vouches for everything
      # that ships.
      - name: Checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.deb *.cdx.json | tee SHA256SUMS

      # Keyless: the signature is bound to this workflow's OIDC identity
      # (verify with `cosign verify-blob --bundle SHA256SUMS.cosign.bundle
      #  --certificate-oidc-issuer https://token.actions.githubusercontent.com
      #  --certificate-identity-regexp '.../release.yml@.*' SHA256SUMS`).
      - name: Sign checksums (cosign keyless)
        run: |
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.cosign.bundle \
            dist/SHA256SUMS

      - name: Release notes from CHANGELOG
        run: |
          version="${TAG#v}"
          base="${version%%-*}"   # strip any -rc.N suffix
          # A final tag has its own dated CHANGELOG section. A pre-release
          # for an upcoming version may not be documented yet — fall back
          # to the base version's section, then to a generic note.
          if python3 scripts/extract-changelog.py "$version" > body.md 2>/dev/null; then
            :
          elif python3 scripts/extract-changelog.py "$base" > body.md 2>/dev/null; then
            :
          else
            echo "Pre-release \`$TAG\` for pipeline validation." > body.md
          fi
          repo="${{ github.repository }}"
          {
            cat body.md
            echo
            echo "---"
            echo
            echo "**Artifacts**"
            echo
            echo "- Static musl binaries for \`x86_64\` and \`aarch64\` (\`.tar.gz\`)."
            echo "- Debian packages (\`.deb\`) for \`amd64\` and \`arm64\` — \`apt install ./siphon-ai_*_amd64.deb\`."
            echo "- \`SHA256SUMS\` — verify with \`sha256sum -c SHA256SUMS\`."
            echo "- \`*-sbom.cdx.json\` — CycloneDX SBOM."
            echo "- \`SHA256SUMS.cosign.bundle\` — cosign keyless signature over the checksums."
            echo "- Container: \`ghcr.io/${repo}:${TAG}\` (multi-arch, cosign-signed)."
            echo
            echo "Verify the checksums signature:"
            echo '```'
            echo "cosign verify-blob --bundle SHA256SUMS.cosign.bundle \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  --certificate-identity-regexp 'release.yml@' SHA256SUMS"
            echo '```'
          } > notes.md

      # Pre-release for any tag with a pre-release suffix (e.g.
      # v0.16.0-rc.1); these are never marked latest.
      - name: Create or update the GitHub release
        run: |
          if [[ "$TAG" == *-* ]]; then
            channel="--prerelease"
          else
            channel="--latest"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --notes-file notes.md \
              $channel
          fi

  # Multi-arch image assembled from the *prebuilt* release binaries (no
  # recompile, no QEMU — the Dockerfile only COPYs per-arch binaries), so
  # the image matches the standalone binaries byte-for-byte. Pushed to
  # GHCR and signed with the same cosign keyless identity.
  container:
    name: container (GHCR)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      # Lay the static binaries out by Docker arch so the release
      # Dockerfile can `COPY ctx/${TARGETARCH}/siphon-ai`.
      - name: Stage per-arch binaries
        run: |
          set -euo pipefail
          mkdir -p ctx
          for pair in \
            "x86_64-unknown-linux-musl:amd64" \
            "aarch64-unknown-linux-musl:arm64"; do
            triple="${pair%%:*}"; arch="${pair##*:}"
            tar -xzf dist/siphon-ai-*-"${triple}".tar.gz
            mkdir -p "ctx/${arch}"
            cp siphon-ai-*-"${triple}"/siphon-ai "ctx/${arch}/siphon-ai"
            rm -rf siphon-ai-*-"${triple}"
          done
          ls -lR ctx

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # `:latest` only for a final release, never a pre-release.
      - name: Build + push multi-arch image
        id: build
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository }}"
          tags=(-t "${image}:${TAG}")
          if [[ "$TAG" != *-* ]]; then
            tags+=(-t "${image}:latest")
          fi
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f docker/Dockerfile.release \
            "${tags[@]}" \
            --metadata-file metadata.json \
            --push ctx
          digest="$(jq -r '.["containerimage.digest"]' metadata.json)"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Sign the image (cosign keyless)
        run: |
          cosign sign --yes \
            "${{ steps.build.outputs.image }}@${{ steps.build.outputs.digest }}"
