name: test

# Gates every PR and every push to main on:
#   1. fmt + clippy + cargo test --workspace
#   2. the SIPp signaling regression suite
#
# Both jobs run on ubuntu-latest. The SIPp job only runs after
# lint-and-test passes so a broken build doesn't burn a full SIPp
# spin-up.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel an in-flight workflow run on the same ref when a new commit
# arrives — saves CI time on PRs that get amended frequently. Pushes
# to main don't cancel because the group changes per ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Show full test backtraces on failure.
  RUST_BACKTRACE: 1

jobs:
  doc-links:
    name: doc links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Validates relative Markdown links across docs/ + README + CLAUDE
      # so a moved/renamed doc can't silently break a reference. Pure
      # Python (stdlib), no toolchain needed — runs in seconds.
      - name: Check relative Markdown links
        run: python3 scripts/check-doc-links.py

  version-consistency:
    name: version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fails if Cargo.toml (source of truth), the README "Current
      # release" marker, and the CHANGELOG's dated heading disagree on
      # the version — the drift that left README at v0.12.2 while the tag
      # was v0.15.0. Pure Python (stdlib); the checker self-tests via
      # --selftest. The release workflow reuses this with --tag to assert
      # the pushed tag equals the workspace version.
      - name: Self-test the checker
        run: python3 scripts/check-version-consistency.py --selftest
      - name: Check version consistency
        run: python3 scripts/check-version-consistency.py

  observability-artifacts:
    name: observability artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Anti-drift: every siphon_ai_* metric referenced in the shipped
      # Prometheus rules / Grafana dashboards under examples/observability/
      # must be a metric the daemon actually emits, so a metric rename can't
      # ship silently-broken artifacts. Pure Python (stdlib).
      - name: Check observability metric names
        run: python3 scripts/check-observability-metrics.py
      # Validate the reference Prometheus config + rules parse (real PromQL
      # + rule-structure check) using promtool from the Prometheus image.
      - name: promtool check rules + config
        run: |
          docker run --rm -v "$PWD/examples/observability":/work -w /work \
            --entrypoint promtool prom/prometheus:latest \
            check config prometheus.yml

  sdk-tests:
    name: server SDK unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Both SDK suites (sdks/python, sdks/typescript) parse every
      # PROTOCOL.md example into typed events and validate every command
      # the SDK can emit against schemas/siphon-ai.v1.json — the SDKs
      # can't drift from the protocol silently. No cargo needed: the
      # committed schema is the contract (lint-and-test regenerates and
      # diffs it separately).
      - name: Python SDK tests
        run: |
          pip install --quiet jsonschema websockets pytest
          python3 -m pytest sdks/python/tests -q
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: TypeScript SDK tests
        run: |
          cd sdks/typescript
          npm install --no-audit --no-fund
          npm test

  lint-and-test:
    name: fmt + clippy + cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins to stable. `rustup show` activates
      # it and installs the listed components (rustfmt, clippy).
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

      # Protocol-schema anti-drift (0.27.0): regenerate the JSON Schema
      # from the Rust types and diff against the committed
      # schemas/siphon-ai.v1.json, then validate every PROTOCOL.md JSON
      # example against it. Lives in this job to reuse the cargo cache
      # (the regen builds siphon-ai-bridge with --features json-schema).
      - name: Check protocol schema (drift + docs corpus)
        run: |
          pip install --quiet jsonschema
          python3 scripts/check-protocol-schema.py

  conformance:
    name: protocol conformance (testkit vs SDK echo servers)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build the testkit
        run: cargo build -p siphon-ai-protocol-testkit

      # ── Python SDK echo server ──────────────────────────────
      - name: Prep + start echo-ws-server-python
        run: |
          python3 -m venv examples/echo-ws-server-python/.venv
          examples/echo-ws-server-python/.venv/bin/pip install --no-input \
              -r examples/echo-ws-server-python/requirements.txt
          examples/echo-ws-server-python/.venv/bin/python \
              examples/echo-ws-server-python/server.py \
              --bind 127.0.0.1:8861 > /tmp/echo-py.log 2>&1 &
          for _ in 1 2 3 4 5; do
            ss -ltn 'sport = :8861' | grep -q LISTEN && exit 0
            sleep 1
          done
          echo "python echo server failed to bind"; cat /tmp/echo-py.log; exit 1

      - name: Testkit vs Python SDK echo server
        run: |
          ./target/debug/siphon-ai-testkit run ws://127.0.0.1:8861/ \
              --report /tmp/conformance-python.json

      # ── TypeScript SDK echo server (Node's first CI outing) ─
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prep + start echo-ws-server-node
        run: |
          cd examples/echo-ws-server-node
          npm install --no-audit --no-fund
          node server.mjs --bind 127.0.0.1:8862 > /tmp/echo-node.log 2>&1 &
          for _ in 1 2 3 4 5; do
            ss -ltn 'sport = :8862' | grep -q LISTEN && exit 0
            sleep 1
          done
          echo "node echo server failed to bind"; cat /tmp/echo-node.log; exit 1

      - name: Testkit vs TypeScript SDK echo server
        run: |
          ./target/debug/siphon-ai-testkit run ws://127.0.0.1:8862/ \
              --report /tmp/conformance-node.json

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "── echo-py.log ──";   cat /tmp/echo-py.log   || true
          echo "── echo-node.log ──"; cat /tmp/echo-node.log || true

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-reports
          path: /tmp/conformance-*.json
          if-no-files-found: ignore

  sipp:
    name: SIPp signaling regression
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install sip-tester + python venv
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sip-tester python3-venv

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build siphon-ai (debug)
        # run-all.sh expects the binary at target/debug/siphon-ai
        # by default; --release would also work via DAEMON_BIN env
        # but debug builds faster on a cold CI cache.
        run: cargo build -p siphon-ai

      - name: Prep echo-ws-server venv
        run: |
          python3 -m venv examples/echo-ws-server-python/.venv
          examples/echo-ws-server-python/.venv/bin/pip install --no-input -r examples/echo-ws-server-python/requirements.txt

      - name: Start echo-ws-server in background
        run: |
          examples/echo-ws-server-python/.venv/bin/python \
              examples/echo-ws-server-python/server.py \
              --bind 127.0.0.1:8765 \
              > /tmp/echo-ws.log 2>&1 &
          echo $! > /tmp/echo-ws.pid
          # Give the listener a beat before SIPp / siphon-ai try to
          # connect. Failure here surfaces as a connection-refused
          # in the daemon log, which is much harder to debug than
          # a step that explicitly waits.
          for _ in 1 2 3 4 5; do
            if ss -ltn 'sport = :8765' | grep -q LISTEN; then
              exit 0
            fi
            sleep 1
          done
          echo "echo-ws-server failed to bind :8765 within 5s"
          cat /tmp/echo-ws.log || true
          exit 1

      - name: Run SIPp scenarios
        run: test-harness/sipp-scenarios/run-all.sh

      - name: Stop echo-ws-server
        if: always()
        run: kill "$(cat /tmp/echo-ws.pid)" || true

      - name: Echo-ws log on failure
        if: failure()
        run: cat /tmp/echo-ws.log || true

      # SIPp writes <scenario>_<pid>_errors.log to the runner's CWD
      # (`-trace_err` in run-all.sh; the runner pins CWD to its own
      # directory). Dump them on failure so a version-skew or
      # message-mismatch is visible without having to download an
      # artifact.
      - name: SIPp errors logs on failure
        if: failure()
        run: |
          shopt -s nullglob
          for f in test-harness/sipp-scenarios/*_errors.log; do
            echo "─── $f ───"
            cat "$f"
            echo
          done

      # The daemon log tells us whether siphon-ai saw / answered the
      # INVITE — critical when the SIPp side reports nothing.
      - name: siphon-ai daemon log on failure
        if: failure()
        run: |
          shopt -s nullglob
          for f in /tmp/siphon-ai-sipp.*.log; do
            echo "─── $f ───"
            cat "$f"
            echo
          done
