[node]
id = "siphon-ai-local"

[sip]
listen = "127.0.0.1:5070"
transports = ["udp"]
user_agent = "SiphonAI/local-dev"

[media]
codecs = ["pcmu", "pcma"]
dtmf = "rfc2833"
rtp_port_range = [40000, 40100]
# vad = "neural"   # Silero speech detection (default "energy"); see docs/CONFIG.md

[bridge]
ws_url = "ws://127.0.0.1:8765/"
ws_connect_timeout_ms = 3000

[observability]
enabled = true
http_listen = "127.0.0.1:9091"

[[route]]
name = "default"
[route.match]
any = true
