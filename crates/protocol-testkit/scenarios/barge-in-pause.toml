# Pause-mode barge-in arbitration (0.32.0, PROTOCOL.md §3.2/§3.14/§4.11).
# The session announces `start.barge_in_mode = "pause"`; a `speech_started`
# with `decision_pending: true` is the arbitration request, and a
# conformant pause-aware server answers with `barge_in_confirm` or
# `barge_in_reject` inside the deadline. The reference echo servers
# always reject (they never want to stop echoing), which is what the
# conformance CI job asserts here. Servers must also tolerate the
# `barge_in_resolved` outcomes they didn't cause (`timeout`).

name = "barge-in-pause"
description = "Arm a pause-mode arbitration, expect a verdict, survive a timeout resolution."

[session]
barge_in_mode = "pause"

[[steps]]                 # get the session flowing (bot is "talking")
action = "send_audio"
frames = 25

[[steps]]
action = "expect_audio"
min_frames = 15
within_ms = 3000

# The arbitration request: caller speech while the bot plays. Typed —
# this must round-trip through the daemon's real BridgeOut shape.
[[steps]]
action = "send_event"
json = '{ "type": "speech_started", "ts_ms": 1200, "decision_pending": true, "decision_deadline_ms": 500 }'

[[steps]]                 # a pause-aware server rules within the window;
action = "expect_command" # the reference echo servers always reject
type = "barge_in_reject"
within_ms = 1000

[[steps]]                 # the daemon acknowledges every resolution
action = "send_event"
json = '{ "type": "barge_in_resolved", "outcome": "rejected" }'

[[steps]]                 # matching speech_stopped for the caller blip
action = "send_event"
json = '{ "type": "speech_stopped", "ts_ms": 1450, "duration_ms": 250 }'

# Timeout tolerance: a resolution the server did NOT cause (its verdict
# lost the race). Must be ignored gracefully, not treated as an error.
[[steps]]
action = "send_event"
json = '{ "type": "barge_in_resolved", "outcome": "timeout" }'

[[steps]]                 # prove the session survived: echo still flows
action = "send_audio"
frames = 25

[[steps]]
action = "expect_audio"
min_frames = 40
within_ms = 2000

[[steps]]
action = "send_stop"
reason = "caller_hangup"

[[steps]]
action = "close"
