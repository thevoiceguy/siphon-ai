# Loads every dashboard JSON under /var/lib/grafana/dashboards on startup.
apiVersion: 1

providers:
  - name: siphon-ai
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
